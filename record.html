<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>복용기록</title>
    <link rel="stylesheet" href="css/record.css" />
  </head>
  <body>
    <div class="record-layout">
      <header class="record-header">
        <button class="back-btn">‹</button>
        <h1>복용기록</h1>
        <span></span>
      </header>

      <main class="record-main">
        <section class="rate-card">
          <div class="rate-circle">
            <strong>87</strong>
            <span>%</span>
          </div>

          <div class="rate-text">
            <h2>오늘의 복용률</h2>
            <p>4 / 5 복용 완료</p>
          </div>
        </section>

        <section class="calendar-card">
          <div class="calendar-head">
            <button>‹</button>
            <h2>2026년 4월 7일</h2>
            <button>›</button>
          </div>

          <div class="week-row">
            <span>일</span>
            <span>월</span>
            <span>화</span>
            <span>수</span>
            <span>목</span>
            <span>금</span>
            <span>토</span>
          </div>

          <div class="date-row">
            <div class="date-cell">
              <span>5</span>
              <i class="done"></i>
            </div>
            <div class="date-cell">
              <span>6</span>
              <i class="ready"></i>
            </div>
            <div class="date-cell">
              <span class="active">7</span>
            </div>
            <div class="date-cell"><span>8</span></div>
            <div class="date-cell"><span>9</span></div>
            <div class="date-cell"><span>10</span></div>
            <div class="date-cell"><span>11</span></div>
          </div>

          <div class="legend">
            <div><span class="done"></span>복용 완료</div>
            <div><span class="ready"></span>복용 전</div>
          </div>
        </section>

        <section class="history-grid">
          <section class="history-section">
            <h2>오늘</h2>

            <div class="history-card">
              <article class="history-item">
                <img src="assets/icons/chfhrcpzm.png" alt="복용 완료" />
                <div>
                  <h3>오전 8:00 아모디핀 5mg</h3>
                  <p>8:03분 복용</p>
                </div>
              </article>

              <article class="history-item">
                <img src="assets/icons/qkfrkddprtm.png" alt="복용 전" />
                <div>
                  <h3>메트포민 500mg</h3>
                  <p>복용 전</p>
                </div>
              </article>
            </div>
          </section>

          <section class="history-section">
            <h2>어제</h2>

            <div class="history-card">
              <article class="history-item">
                <img src="assets/icons/chfhrcpzm.png" alt="복용 완료" />
                <div>
                  <h3>오전 8:00 아모디핀 5mg</h3>
                  <p>8:03분 복용</p>
                </div>
              </article>

              <article class="history-item">
                <img src="assets/icons/qkfrkddprtm.png" alt="복용 완료" />
                <div>
                  <h3>비타민 B 복합제</h3>
                  <p>14:20분 복용</p>
                </div>
              </article>
            </div>
          </section>
        </section>
      </main>

      <nav class="bottom-nav">
        <button class="nav-item active">
          <img src="assets/icons/wlq.png" alt="홈" />
          <span>홈</span>
        </button>
        <button class="nav-item">
          <img src="assets/icons/dirrhksfl.png" alt="약 리스트" />
          <span>약 리스트</span>
        </button>
        <button class="nav-item">
          <img src="assets/icons/rlfhr.png" alt="기록" />
          <span>기록</span>
        </button>
        <button class="nav-item large">
          <img src="assets/icons/rjsrkd-8.png" alt="건강" />
          <span>건강</span>
        </button>
        <button class="nav-item large">
          <img src="assets/icons/tjfwjd-8.png" alt="마이페이지" />
          <span>마이페이지</span>
        </button>
      </nav>
    </div>
  </body>
</html>
