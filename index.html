<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>약속, 약 정보 관리 앱</title>

    <link rel="stylesheet" href="css/style.css" />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <!-- 헤더 -->
      <header class="header">
        <div class="container header-inner">
          <div class="header-left">
            <a href="#" class="logo">
              <img src="assets/icons/logo.png" alt="약속로고" />
            </a>

            <nav class="nav">
              <a href="#" class="active">홈</a>
              <a href="#">기능</a>
              <a href="#">고객센터</a>
            </nav>
          </div>
        </div>
      </header>

      <!-- 메인 -->
      <main class="main">
        <div class="container main-inner">
          <!-- 왼쪽 -->
          <section class="hero">
            <div class="hero-image">
              <img src="assets/icons/dlgydls.png" alt="약 복용 관리 이미지" />
            </div>
          </section>

          <!-- 오른쪽 -->
          <section class="login-panel">
            <img
              src="assets/icons/logo.png"
              alt="약속 로고"
              class="login-logo"
            />

            <h3 class="login-title">
              복잡한 약 복용,<br />
              한 번에 쉽게 관리해보세요
            </h3>

            <form class="login-form">
              <div class="input-group">
                <input type="email" placeholder="이메일" />
              </div>

              <div class="input-group">
                <input type="password" placeholder="비밀번호" />
              </div>

              <button type="button" id="loginBtn" class="button login-button">
                로그인
              </button>
            </form>

            <div class="login-links">
              <a href="#">아이디 찾기</a>
              <span>|</span>
              <a href="membership.html">회원가입</a>
              <span>|</span>
              <a href="#">비밀번호 찾기</a>
            </div>

            <div class="social-divider">
              <span>또는</span>
            </div>

            <div class="social-login">
              <a href="#" class="social-btn">
                <img src="assets/icons/naver.png" alt="네이버 로그인" />
              </a>

              <a href="#" class="social-btn">
                <img src="assets/icons/kako.png" alt="카카오 로그인" />
              </a>

              <a href="#" class="social-btn">
                <img src="assets/icons/facebook.png" alt="페이스북 로그인" />
              </a>

              <a href="#" class="social-btn">
                <img src="assets/icons/gogole.png" alt="구글 로그인" />
              </a>
            </div>
          </section>
        </div>
      </main>

      <!-- 푸터 -->
      <footer class="footer">
        <div class="container footer-inner">
          <div class="footer-links">
            <a href="#">이용약관</a>
            <span>|</span>
            <a href="#">개인정보 방침</a>
            <span>|</span>
            <a href="#">고객지원</a>
          </div>

          <p class="copyright">© 2026 Yaksok. All rights reserved.</p>
        </div>
      </footer>
    </div>
  </body>
</html>
