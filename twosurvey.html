<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>약속 설문 2</title>
    <link rel="stylesheet" href="css/survey.css" />
    <script src="js/membership.js" defer></script>
  </head>
  <body>
    <div class="survey-layout">
      <main class="survey-main">
        <div class="survey-container">
          <section class="survey-content">
            <div class="survey-left">
              <div class="progress-wrap">
                <div class="progress-line active"></div>
                <p class="progress-text">2 / 2</p>
                <div class="progress-line active"></div>
              </div>

              <h1 class="survey-title">
                하루에 몇 번 복용<br />
                하시나요?
              </h1>
            </div>

            <section class="survey-options">
              <button type="button" class="option-card">
                <img
                  src="assets/icons/dkfdirxhd.png"
                  alt="하루 1회"
                  class="option-icon"
                />
                <span class="option-text">하루 1회</span>
              </button>

              <button type="button" class="option-card">
                <img
                  src="assets/icons/dkfdirxhd.png"
                  alt="하루 2회"
                  class="option-icon"
                />
                <span class="option-text">하루 2회</span>
              </button>

              <button type="button" class="option-card">
                <img
                  src="assets/icons/dkfdirxhd.png"
                  alt="하루 3회"
                  class="option-icon"
                />
                <span class="option-text">하루 3회</span>
              </button>

              <button type="button" class="option-card">
                <img
                  src="assets/icons/dkfdirxhd.png"
                  alt="일정 하지 않음"
                  class="option-icon"
                />
                <span class="option-text">일정 하지 않음</span>
              </button>
            </section>
          </section>
        </div>
      </main>

      <button type="button" class="next-button">다음</button>
    </div>
  </body>
</html>
