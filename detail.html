<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>약 상세페이지</title>
    <link rel="stylesheet" href="css/detail.css" />
  </head>
  <body>
    <div class="detail-layout">
      <header class="detail-header">
        <a href="medicine.html" class="back-btn">‹</a>
        <h1>아모디핀 5mg</h1>
        <button class="more-btn">•••</button>
      </header>

      <main class="detail-main">
        <section class="medicine-hero">
          <div class="hero-top">
            <div class="pill-img">
              <img src="assets/icons/dkahekvls.png" alt="아모디핀 이미지" />
            </div>

            <div class="hero-text">
              <h2>아모디핀 5mg</h2>
              <p>혈압약 1일 1회</p>

              <div class="tag-row">
                <span>혈압</span>
                <span>지질이상</span>
              </div>
            </div>
          </div>

          <div class="schedule-box">
            <div>
              <strong>복용 일정</strong>
              <span>오전 8:00</span>
            </div>
            <p>4시간 전 복용 ›</p>
          </div>
          <div class="quick-menu">
            <a href="record.html" class="quick-item">
              <img src="assets/icons/qhrdyd.png" alt="복용기록" />
              <span>복용 기록</span>
            </a>

            <a href="alarm.html" class="quick-item">
              <img src="assets/icons/dkffkatkfwjd.png" alt="알림 설정" />
              <span>알림 설정</span>
            </a>

            <a href="guide.html" class="quick-item">
              <img src="assets/icons/qhrdydrkdlem.png" alt="복용 가이드" />
              <span>복용 가이드</span>
            </a>
          </div>
        </section>

        <section class="content-grid">
          <section class="record-section">
            <div class="section-title">
              <h2>내 복용 기록</h2>
              <a href="#" class="title-link">
                <span>›</span>
              </a>
            </div>
            <div class="record-card">
              <div class="record-line"></div>

              <div class="record-item">
                <span class="dot"></span>

                <div class="record-icon success">
                  <img src="assets/icons/chfhrcpzm.png" alt="복용 완료" />
                </div>

                <div class="record-text">
                  <h3>오전 8:00 아모디핀 5mg</h3>
                  <p>8:03분 복용</p>
                </div>
              </div>

              <div class="record-item">
                <span class="dot"></span>

                <div class="record-icon fail">
                  <img src="assets/icons/qkfrkddprtm.png" alt="복용 전" />
                </div>

                <div class="record-text">
                  <h3>메트포민 500mg</h3>
                  <p>복용 전</p>
                </div>
              </div>
            </div>
          </section>

          <section class="info-section">
            <h2>약 정보</h2>

            <div class="info-card">
              <a href="#">
                <img src="assets/icons/tlawkd.png" alt="" />
                <div>
                  <strong>효능 및 효과</strong>
                  <p>고혈압, 협심증, 혈관성 통증 개선</p>
                </div>
                <span>›</span>
              </a>

              <a href="#">
                <img src="assets/icons/wndmltkgkd.png" alt="" />
                <div>
                  <strong>주의 사항</strong>
                  <p>기립성 저혈압 유발 주의, 과다복용 경고</p>
                </div>
                <span>›</span>
              </a>

              <a href="#">
                <img src="assets/icons/qnwkrdyd.png" alt="" />
                <div>
                  <strong>부작용</strong>
                  <p>어지러움, 두통, 속 불편함</p>
                </div>
                <span>›</span>
              </a>
            </div>
          </section>
        </section>
      </main>

      <nav class="bottom-nav">
        <button class="nav-item active">
          <img src="assets/icons/wlq.png" alt="홈" />
          <span>홈</span>
        </button>
        <button class="nav-item">
          <img src="assets/icons/dirrhksfl.png" alt="약 리스트" />
          <span>약 리스트</span>
        </button>
        <button class="nav-item">
          <img src="assets/icons/rlfhr.png" alt="기록" />
          <span>기록</span>
        </button>
        <button class="nav-item large">
          <img src="assets/icons/rjsrkd-8.png" alt="건강" />
          <span>건강</span>
        </button>
        <button class="nav-item large">
          <img src="assets/icons/tjfwjd-8.png" alt="마이페이지" />
          <span>마이페이지</span>
        </button>
      </nav>
    </div>
  </body>
</html>
